site_name: qcfinancial
site_description: C++17 library for valuation of linear interest rate and FX derivatives
site_url: https://qcfinancial.github.io/qcfinancial/
repo_url: https://github.com/qcfinancial/qcfinancial
repo_name: qcfinancial/qcfinancial
edit_uri: edit/develop/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdoxy:
      projects:
        qcfinancial:
          src-dirs: include/
          full-doc: true
          doxy-cfg:
            PROJECT_NAME: qcfinancial
            FILE_PATTERNS: "*.h"
            RECURSIVE: YES
            EXCLUDE: include/deprecated
            EXCLUDE_PATTERNS: "*/deprecated/*"
            INPUT_ENCODING: ISO-8859-1
            GENERATE_HTML: NO
            GENERATE_XML: YES
            EXTRACT_ALL: YES
            EXTRACT_PRIVATE: NO
            EXTRACT_STATIC: YES
            HIDE_UNDOC_MEMBERS: NO
            HAVE_DOT: NO

nav:
  - Home: index.md
  - User Guide:
      - Architecture: architecture.md
      - Instruments: instruments.md
      - Building from Source: building.md
  - API Reference:
      - All Classes: "qcfinancial/annotated.md"
      - Class Index: "qcfinancial/classes.md"
      - Class Hierarchy: "qcfinancial/hierarchy.md"
      - Namespaces: "qcfinancial/namespaces.md"
      - Files: "qcfinancial/files.md"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qcfinancial/qcfinancial
  version:
    provider: mike
